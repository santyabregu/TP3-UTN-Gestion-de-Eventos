<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Gestión de Eventos</title>
    <!-- Importamos el mismo estilo de la aplicación para consistencia -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="support-page">
    <div id="support-container" class="glass-card">
        <h2>Soporte Técnico</h2>
        <p>Si tienes problemas con la aplicación, por favor completa el formulario a continuación y nos pondremos en contacto contigo lo antes posible.</p>
        
        <form id="supportForm">
            <input type="text" id="supNombre" placeholder="Tu Nombre Completo" required>
            <input type="email" id="supEmail" placeholder="Tu Email de Contacto" required>
            <textarea id="supMensaje" placeholder="Tu mensaje o problema... (sé lo más detallado posible)" rows="5" required></textarea>
            <button type="submit">Enviar Mensaje</button>
        </form>
        
        <p><a href="index.html">Volver a la Aplicación</a></p>
    </div>
</body>
</html>
